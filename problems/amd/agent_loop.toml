[workspace]
root = ".agent-loop"
popcorn_cli = "popcorn-cli"
api_url = "https://site--bot--dxfjds728w5v.code.run"
default_gpu = "MI355X"
default_mode = "benchmark"
leaderboard_reference_seconds = 338.0
leaderboard_timeout_seconds = 600.0
promote_on_improve = true
improvement_epsilon = 0.0

[llm]
enabled = true
provider = "codex_cli"
model = "gpt-5-mini"
api_url = "https://api.openai.com/v1/responses"
api_key_env_var = "OPENAI_API_KEY"
anthropic_api_url = "https://api.anthropic.com/v1/messages"
anthropic_api_key_env_var = "ANTHROPIC_API_KEY"
anthropic_version = "2023-06-01"
openrouter_api_url = "https://openrouter.ai/api/v1/chat/completions"
openrouter_api_key_env_var = "OPENROUTER_API_KEY"
openrouter_http_referer = ""
openrouter_title = "reference-kernels-agent-loop"
reasoning_effort = "medium"
max_output_tokens = 12000
fallback_to_seed = false
codex_cli = "codex"
codex_model = ""
codex_sandbox = "read-only"
codex_use_plan = true
codex_parallel_agents = 3

[problems.mxfp4_mm]
submission_path = "fp8-mm/submission.py"
leaderboard = "amd-mxfp4-mm"
gpu = "MI355X"
mode = "benchmark"
objective = "geom_mean_ns"
goal = "min"
default_family = "hip_explore"
parent_strategy = "latest"
prune_failures = false
keep_revert = true
max_changed_lines = 120
max_edit_hunks = 4
mutator_command = "python3 -m agent_loop.llm_mutator --config agent_loop.toml --parent {parent} --output {output} --context {context}"

[problems.moe_mxfp4]
submission_path = "moe/submission.py"
leaderboard = "amd-moe-mxfp4"
gpu = "MI355X"
mode = "benchmark"
objective = "geom_mean_ns"
goal = "min"
mutator_command = "python3 -m agent_loop.llm_mutator --config agent_loop.toml --parent {parent} --output {output} --context {context}"

[problems.mixed_mla]
submission_path = "mla-decode/submission.py"
leaderboard = "amd-mixed-mla"
gpu = "MI355X"
mode = "benchmark"
objective = "geom_mean_ns"
goal = "min"
mutator_command = "python3 -m agent_loop.llm_mutator --config agent_loop.toml --parent {parent} --output {output} --context {context}"
